Section "Device"
    Identifier  "NVIDIA GPU"
    Driver      "nvidia"
    BusID       "PCI:1:0:0"
    Option      "Coolbits" "28"
EndSection

# This file is shared by both GPU families in this repo (RTX 5090 and RTX PRO
# 6000) — Coolbits unlocks OC controls at the driver/xorg level and has no
# per-model settings. "Identifier" is an arbitrary xorg label, not tied to the
# installed card. "BusID" IS machine-specific: confirm yours with
# `lspci | grep -i nvidia` and update the line above if it differs.
#
# Coolbits value 28 = bitmask of:
#   4  - Enable GPU clock rate adjustment via nvidia-settings
#   8  - Enable GPU overclocking via nvidia-settings
#  16  - Enable GPU fan control via nvidia-settings
#
# Install with:
#   sudo cp config/10-coolbits.conf /etc/X11/xorg.conf.d/
#   sudo systemctl restart display-manager
