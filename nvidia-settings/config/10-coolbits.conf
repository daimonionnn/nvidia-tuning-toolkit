Section "Device"
    Identifier  "NVIDIA RTX 5090"
    Driver      "nvidia"
    BusID       "PCI:1:0:0"
    Option      "Coolbits" "28"
EndSection

# Coolbits value 28 = bitmask of:
#   4  - Enable GPU clock rate adjustment via nvidia-settings
#   8  - Enable GPU overclocking via nvidia-settings
#  16  - Enable GPU fan control via nvidia-settings
#
# Install with:
#   sudo cp config/10-coolbits.conf /etc/X11/xorg.conf.d/
#   sudo systemctl restart display-manager
